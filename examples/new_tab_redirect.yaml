# Multi-tab redirect workflow example
#
# Some websites open the final content in a new browser tab.
# This workflow handles that pattern.
#
# Use only on websites you own or have explicit permission to test.

name: new-tab-redirect-example
start_url: https://example.com/page-with-new-tab

expected_final_domain: destination.example.com
max_wait_seconds: 90
output_format: human
headless: true
timeout: 30
retries: 3

steps:
  - action: open_url
    url: https://example.com/page-with-new-tab
    label: "Open page that will open a new tab"

  - action: wait_for_element
    selector_type: css
    selector: "a.open-new-tab"
    timeout: 15
    label: "Wait for new-tab link"

  - action: click_element
    selector_type: css
    selector: "a.open-new-tab"
    label: "Click link that opens new tab"

  - action: switch_to_new_tab
    timeout: 10
    label: "Switch focus to the new tab"

  - action: wait_for_element
    selector_type: css
    selector: "h1"
    timeout: 15
    label: "Wait for destination page to load"

  - action: extract_current_url
    store_as: resolved_url
    label: "Capture final URL in new tab"

  - action: extract_page_title
    store_as: page_title
    label: "Capture page title"
